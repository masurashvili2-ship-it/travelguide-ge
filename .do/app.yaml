# DigitalOcean App Platform — App Spec (Infrastructure as Code).
# 1. Push this repo to GitHub.
# 2. In DO: Apps → Create → GitHub → pick repo; or: doctl apps create --spec .do/app.yaml
# 3. Replace YOUR_GITHUB_USER/travelguide-ge with your repo slug.
# 4. Add a SECRET env SESSION_SECRET (32+ random chars) in the dashboard (do not commit it).
# 5. After deploy: App → Settings → Domains → add travelguide.ge and point DNS to App Platform.

name: travelguide-ge
region: fra

alerts:
  - rule: DEPLOYMENT_FAILED
  - rule: DOMAIN_FAILED

services:
  - name: web
    dockerfile_path: Dockerfile
    instance_count: 1
    instance_size_slug: apps-s-1vcpu-1gb
    http_port: 8080
    github:
      branch: main
      deploy_on_push: true
      repo: YOUR_GITHUB_USER/travelguide-ge
    envs:
      - key: NODE_ENV
        value: production
      - key: HOST
        value: "0.0.0.0"
      # PORT is set by App Platform — Astro reads process.env.PORT
